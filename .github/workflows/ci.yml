name: CI

# Pipeline mínimo da Fase 0 (RF0.5): lint, type-check, testes e verificação
# básica de segurança. Cada PR deve passar por todas as etapas.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Format check (black)
        run: uv run black --check app tests

      - name: Lint (ruff)
        run: uv run ruff check app tests

      - name: Security lint (ruff bandit rules)
        run: uv run ruff check --select S app

      - name: Type check (mypy)
        run: uv run mypy app

      - name: Tests
        run: uv run pytest --cov=app --cov-report=term-missing
